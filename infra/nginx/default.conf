upstream quiz_backend {
    ip_hash;
    server backend-1:4000 max_fails=3 fail_timeout=10s;
    server backend-2:4000 max_fails=3 fail_timeout=10s;
    server backend-3:4000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 4000;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_next_upstream error timeout http_502 http_503 http_504;

    location /health {
        proxy_pass http://quiz_backend/health;
    }

    location /ready {
        proxy_pass http://quiz_backend/ready;
    }

    location /metrics {
        proxy_pass http://quiz_backend/metrics;
    }

    location /ws/backend-1/socket.io/ {
        proxy_set_header Connection "upgrade";
        proxy_pass http://backend-1:4000/socket.io/;
    }

    location /ws/backend-2/socket.io/ {
        proxy_set_header Connection "upgrade";
        proxy_pass http://backend-2:4000/socket.io/;
    }

    location /ws/backend-3/socket.io/ {
        proxy_set_header Connection "upgrade";
        proxy_pass http://backend-3:4000/socket.io/;
    }

    location /socket.io/ {
        proxy_set_header Connection "upgrade";
        proxy_pass http://quiz_backend;
    }

    location / {
        proxy_pass http://quiz_backend;
    }
}
