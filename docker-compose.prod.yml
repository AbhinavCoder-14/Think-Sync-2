version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quiz-admin-2
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mypassword-2}
      POSTGRES_DB: quiz-admin-db-2
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz-admin-2 -d quiz-admin-db-2"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - think-sync-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - think-sync-network

  backend-1:
    build:
      context: .
      dockerfile: Backend/dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      INSTANCE_ID: backend-1
      BACKEND_INSTANCES: backend-1,backend-2
      PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL:-http://localhost:4000}
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "4000"
    networks:
      - think-sync-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend-2:
    build:
      context: .
      dockerfile: Backend/dockerfile
    restart: unless-stopped
    environment:
      PORT: 4000
      INSTANCE_ID: backend-2
      BACKEND_INSTANCES: backend-1,backend-2
      PUBLIC_GATEWAY_URL: ${PUBLIC_GATEWAY_URL:-http://localhost:4000}
      NODE_ENV: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "4000"
    networks:
      - think-sync-network
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
    networks:
      - think-sync-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: quizz-app/dockerfile
      args:
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
        DATABASE_URL: ${DATABASE_URL:-postgresql://quiz-admin-2:mypassword-2@postgres:5432/quiz-admin-db-2}
        JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
        REDIS_HOST: ${REDIS_HOST:-redis}
        REDIS_PORT: ${REDIS_PORT:-6379}
        REDIS_PASSWORD: ${REDIS_PASSWORD:-}
        LOCAL_DEVELOPMENT: ${LOCAL_DEVELOPMENT:-false}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://quiz-admin-2:mypassword-2@postgres:5432/quiz-admin-db-2}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
      LOCAL_DEVELOPMENT: ${LOCAL_DEVELOPMENT:-false}
    depends_on:
      postgres:
        condition: service_healthy
      gateway:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - think-sync-network

networks:
  think-sync-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
